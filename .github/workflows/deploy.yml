name: Deploy PlayerKit

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Workspace Packages
        run: pnpm --filter "./packages/**" build

      - name: Build Docs
        run: pnpm --filter docs build

      - name: Build Playground
        run: pnpm --filter playground build
        env:
          # Sets base asset paths to match your GitHub Pages repository name + subdirectory
          VITE_BASE_PATH: /playerkit/playground/

      - name: Merge Artifacts
        run: |
          # Copy the playground build into the docs out directory
          # so they deploy together in a single Github Pages artifact
          mkdir -p ./apps/docs/out/playground
          cp -R ./apps/playground/dist/* ./apps/docs/out/playground/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./apps/docs/out"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

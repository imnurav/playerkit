<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#2e3192" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Play Button Gradient -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shape -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Inner Ring / Accent -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="12" />
  <!-- Play Button Symbol -->
  <path d="M192 144v224c0 14.1 15.3 22.9 27.6 15.8l192-112c12.2-7.1 12.2-24.6 0-31.7l-192-112C207.3 121.1 192 129.9 192 144z" fill="url(#playGrad)" filter="url(#glow)" />
</svg>
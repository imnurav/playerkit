<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayerKit Standalone Player</title>
    <script>
      // Patch touch APIs BEFORE React bundles load so the player's
      // useEffect touch detection sees a mobile environment.
      Object.defineProperty(navigator, "maxTouchPoints", {
        get: () => 5,
        configurable: true,
      });
      // Also ensure ontouchstart exists on window
      if (!("ontouchstart" in window)) {
        window.ontouchstart = null;
      }
    </script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/player.tsx"></script>
  </body>
</html>
